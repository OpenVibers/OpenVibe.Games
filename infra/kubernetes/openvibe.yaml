apiVersion: v1
kind: Namespace
metadata:
  name: openvibe
---
apiVersion: v1
kind: Secret
metadata:
  name: openvibe-secrets
  namespace: openvibe
type: Opaque
stringData:
  postgres-password: change-me
  database-url: postgres://openvibe:change-me@postgres:5432/openvibe
  admin-secret: change-me
  server-secret: change-me
  steam-web-api-key: change-me
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openvibe-config
  namespace: openvibe
data:
  STEAM_APP_ID: "243750"
  OPENVIBE_PUBLIC_URL: "https://openvibe.games"
  OPENVIBE_CDN_BASE_URL: "https://openvibe.games/cdn"
  STEAM_WEB_API_BASE: "https://api.steampowered.com"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openvibe-nginx
  namespace: openvibe
data:
  default.conf: |
    server {
        listen 80;
        server_name openvibe.games www.openvibe.games;

        client_max_body_size 50m;

        location /health {
            return 200 "ok\n";
            add_header content-type text/plain;
        }

        location /api/ {
            proxy_pass http://api:3000/;
            proxy_http_version 1.1;
            proxy_set_header host $host;
            proxy_set_header x-forwarded-for $proxy_add_x_forwarded_for;
            proxy_set_header x-forwarded-proto $scheme;
        }

        location /cdn/ {
            alias /var/www/openvibe-cdn/;
            autoindex off;
            access_log off;
            expires 30d;
            add_header cache-control "public, immutable";
            add_header x-openvibe-cdn "openvibe.games";
        }

        location / {
            return 302 /cdn/;
        }
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: openvibe
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: openvibe
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cdn-assets
  namespace: openvibe
spec:
  accessModes: ["ReadWriteMany"]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: openvibe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_USER
              value: openvibe
            - name: POSTGRES_DB
              value: openvibe
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openvibe-secrets
                  key: postgres-password
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: openvibe
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: openvibe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: openvibe
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: openvibe
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ghcr.io/openvibers/openvibe.games-api:latest
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3000"
            - name: OPENVIBE_DEV_AUTH_ENABLED
              value: "false"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: openvibe-secrets
                  key: database-url
            - name: SESSION_REDIS_URL
              value: redis://redis:6379
            - name: OPENVIBE_ADMIN_SECRET
              valueFrom:
                secretKeyRef:
                  name: openvibe-secrets
                  key: admin-secret
            - name: OPENVIBE_DEFAULT_SERVER_SECRET
              valueFrom:
                secretKeyRef:
                  name: openvibe-secrets
                  key: server-secret
            - name: STEAM_WEB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openvibe-secrets
                  key: steam-web-api-key
          envFrom:
            - configMapRef:
                name: openvibe-config
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: openvibe
spec:
  selector:
    app: api
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cdn
  namespace: openvibe
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cdn
  template:
    metadata:
      labels:
        app: cdn
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: assets
              mountPath: /var/www/openvibe-cdn
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
      volumes:
        - name: assets
          persistentVolumeClaim:
            claimName: cdn-assets
        - name: nginx-config
          configMap:
            name: openvibe-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: cdn
  namespace: openvibe
spec:
  selector:
    app: cdn
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openvibe-web
  namespace: openvibe
spec:
  rules:
    - host: openvibe.games
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cdn
                port:
                  number: 80
    - host: www.openvibe.games
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cdn
                port:
                  number: 80
