<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OpenVibe: Source — Loading</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0d0d14;
    color: #e8e8f0;
    font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
    user-select: none;
    cursor: default;
  }

  /* Whole-page fade: in when the window shows, out when the main process adds
     .ov-fade-out to <html> ~250ms before destroying the window. */
  body {
    opacity: 0;
    animation: page-in 0.45s ease 0.05s forwards;
    transition: opacity 0.25s ease;
  }
  html.ov-fade-out body {
    animation: none;
    opacity: 0 !important;
  }
  @keyframes page-in { to { opacity: 1; } }

  /* Subtle animated background: drifting radial glows */
  .bg {
    position: fixed;
    inset: 0;
    overflow: hidden;
    z-index: 0;
  }
  .bg::before, .bg::after {
    content: '';
    position: absolute;
    width: 70vmax;
    height: 70vmax;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.14;
  }
  .bg::before {
    background: radial-gradient(circle, #00c8ff 0%, transparent 60%);
    top: -25vmax;
    left: -15vmax;
    animation: drift-a 26s ease-in-out infinite alternate;
  }
  .bg::after {
    background: radial-gradient(circle, #a855f7 0%, transparent 60%);
    bottom: -30vmax;
    right: -15vmax;
    animation: drift-b 32s ease-in-out infinite alternate;
  }
  @keyframes drift-a {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(12vmax, 8vmax) scale(1.15); }
  }
  @keyframes drift-b {
    from { transform: translate(0, 0) scale(1.1); }
    to   { transform: translate(-10vmax, -6vmax) scale(0.95); }
  }

  /* Faint scanline grid for a Source-y feel */
  .grid {
    position: fixed;
    inset: 0;
    z-index: 1;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
  }

  /* Rising particles (populated by script) */
  #particles {
    position: fixed;
    inset: 0;
    z-index: 1;
    overflow: hidden;
    pointer-events: none;
  }
  .p {
    position: absolute;
    bottom: -8px;
    border-radius: 50%;
    opacity: 0;
    animation: rise linear infinite;
  }
  @keyframes rise {
    0%   { transform: translate(0, 0); opacity: 0; }
    12%  { opacity: var(--o, 0.35); }
    88%  { opacity: var(--o, 0.35); }
    100% { transform: translate(var(--dx, 0px), -108vh); opacity: 0; }
  }

  /* Vignette above everything decorative, below the content */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background: radial-gradient(ellipse at center,
      transparent 42%,
      rgba(6, 6, 12, 0.45) 74%,
      rgba(3, 3, 8, 0.82) 100%);
  }

  .stage {
    position: relative;
    z-index: 3;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
  }

  .wordmark {
    font-size: clamp(34px, 5.5vw, 64px);
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .wordmark .open { color: #e8e8f0; }
  .wordmark .vibe {
    color: #00c8ff;
    animation: glow-pulse 2.8s ease-in-out infinite;
  }
  @keyframes glow-pulse {
    0%, 100% { text-shadow: 0 0 18px rgba(0, 200, 255, 0.35), 0 0 46px rgba(0, 200, 255, 0.12); }
    50%      { text-shadow: 0 0 30px rgba(0, 200, 255, 0.75), 0 0 80px rgba(0, 200, 255, 0.32); }
  }
  .wordmark .source {
    display: block;
    text-align: center;
    font-size: 0.34em;
    font-weight: 600;
    letter-spacing: 0.55em;
    margin-top: 10px;
    color: #8a8aa0;
  }

  .phase {
    min-height: 1.6em;
    font-size: clamp(15px, 1.6vw, 20px);
    font-weight: 500;
    letter-spacing: 0.06em;
    color: #b8b8cc;
    text-align: center;
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  .phase.swap { opacity: 0; transform: translateY(4px); }

  /* Indeterminate sheen bar with a soft under-glow */
  .bar {
    width: min(460px, 70vw);
    height: 4px;
    border-radius: 4px;
    background: rgba(255, 255, 255, 0.07);
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 18px rgba(0, 200, 255, 0.18);
  }
  .bar::before {
    content: '';
    position: absolute;
    top: 0;
    left: -40%;
    width: 40%;
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, transparent, #00c8ff, #06ffa5, transparent);
    animation: sheen 1.6s ease-in-out infinite;
  }
  @keyframes sheen {
    from { left: -40%; }
    to   { left: 100%; }
  }

  .hint {
    font-size: 12px;
    letter-spacing: 0.08em;
    color: #55556a;
    text-transform: uppercase;
  }

  /* Footer: mode name */
  .footer {
    position: fixed;
    left: 24px;
    bottom: 20px;
    z-index: 4;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #55556a;
  }
  .footer .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #00c8ff;
    box-shadow: 0 0 8px rgba(0, 200, 255, 0.8);
    animation: dot-pulse 1.8s ease-in-out infinite;
  }
  @keyframes dot-pulse {
    0%, 100% { opacity: 0.4; }
    50%      { opacity: 1; }
  }
  .footer .mode { color: #00c8ff; }

  .hide-btn {
    position: fixed;
    right: 22px;
    bottom: 20px;
    z-index: 4;
    padding: 8px 18px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #8a8aa0;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 6px;
    cursor: pointer;
    transition: color 0.15s, background 0.15s, border-color 0.15s;
    font-family: inherit;
  }
  .hide-btn:hover {
    color: #e8e8f0;
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(0, 200, 255, 0.4);
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid"></div>
  <div id="particles"></div>
  <div class="vignette"></div>

  <div class="stage">
    <div class="wordmark">
      <span class="open">OPEN</span><span class="vibe">VIBE</span>
      <span class="source">: SOURCE</span>
    </div>
    <div class="bar"></div>
    <div class="phase" id="phase">Waiting for Source&hellip;</div>
    <div class="hint">The game window will take over when ready</div>
  </div>

  <div class="footer">
    <span>Launching</span>
    <span class="dot"></span>
    <span class="mode" id="mode-name">Hub</span>
  </div>

  <button class="hide-btn" id="hide" type="button">Hide</button>

<script>
  'use strict';
  (function () {
    var phaseEl = document.getElementById('phase');
    var swapTimer = null;

    // Footer mode name from the ?mode= query the main process passes along.
    var MODE_LABELS = {
      hub: 'Hub',
      prophunt: 'Prop Hunt',
      deathrun: 'Deathrun',
      fortwars: 'Fort Wars',
      traitortown: 'Traitor Town',
    };
    try {
      var mode = new URLSearchParams(window.location.search).get('mode') || 'hub';
      document.getElementById('mode-name').textContent =
        MODE_LABELS[mode] || mode.toUpperCase();
    } catch (e) {}

    // Rising background particles.
    (function () {
      var host = document.getElementById('particles');
      if (!host) return;
      var COLORS = ['#00c8ff', '#06ffa5', '#a855f7', '#e8e8f0'];
      for (var i = 0; i < 26; i++) {
        var p = document.createElement('div');
        p.className = 'p';
        var size = 1.5 + Math.random() * 2.5;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = (Math.random() * 100) + '%';
        p.style.background = COLORS[i % COLORS.length];
        p.style.setProperty('--o', String(0.12 + Math.random() * 0.3));
        p.style.setProperty('--dx', ((Math.random() - 0.5) * 120).toFixed(0) + 'px');
        p.style.animationDuration = (9 + Math.random() * 14).toFixed(1) + 's';
        p.style.animationDelay = (-Math.random() * 20).toFixed(1) + 's';
        host.appendChild(p);
      }
    })();

    // Well-known hook: main process pushes phase text via executeJavaScript.
    // Phase swaps fade the old text out, then the new text in.
    window.__ovSetPhase = function (text) {
      if (!text || typeof text !== 'string') return;
      window.__ovPhase = text;
      if (!phaseEl) return;
      phaseEl.classList.add('swap');
      clearTimeout(swapTimer);
      swapTimer = setTimeout(function () {
        phaseEl.textContent = text;
        phaseEl.classList.remove('swap');
      }, 200);
    };

    // If a phase was staged before this script ran, apply it now.
    if (typeof window.__ovPhase === 'string' && window.__ovPhase) {
      phaseEl.textContent = window.__ovPhase;
    }

    document.getElementById('hide').addEventListener('click', function (e) {
      e.stopPropagation();
      window.close();
    });
  })();
</script>
</body>
</html>
