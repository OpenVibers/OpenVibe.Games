// OpenVibe client defaults — the HTML GUI console replaces the stock Source
// console. Executed from autoexec.cfg.
//
// con_enable 0 keeps the engine's VGUI console from opening; the console key
// toggles the OpenVibe console route instead (ov_console, from client.dll).
// Use "con_enable 1; toggleconsole" from the OpenVibe console if the stock
// console is ever needed for emergencies.
con_enable 0
bind "`" "ov_console"
bind "F10" "ov_console"
bind "F1" "ov_menu_main"
echo "OpenVibe: stock console disabled; ` and F10 toggle the OpenVibe console"
