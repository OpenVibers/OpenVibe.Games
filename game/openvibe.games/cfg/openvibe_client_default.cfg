// OpenVibe client defaults — the HTML GUI console replaces the stock Source
// console. Executed from autoexec.cfg.
//
// con_enable 0 keeps the engine's VGUI console from opening; the console key
// toggles the OpenVibe console route instead (ov_console, from client.dll).
// Use "con_enable 1; toggleconsole" from the OpenVibe console if the stock
// console is ever needed for emergencies.
con_enable 0
bind "`" "ov_console"
bind "F10" "ov_console"
bind "F1" "ov_menu_main"

// OpenVibe economy: toggle the cade/spawn quick menu (HTML GUI overlay).
// ov_econ_menu is a JS-realm command the engine doesn't know — keybinds must
// go through the client-side forwarder ov_js_cmd_cl.
bind "c" "ov_js_cmd_cl ov_econ_menu"

// REQUIRED for local dev: Source routes 127.0.0.1 through its in-process
// listen-server loopback queue by default, so connects to a separate local
// DEDICATED server never leave the process — "Connection failed after 4
// retries" while the server sees nothing. Real sockets fix it.
net_usesocketsforloopback 1

echo "OpenVibe: stock console disabled; ` and F10 toggle the OpenVibe console"
