// Shared local development defaults for OpenVibe: Source.
//
// sv_lan MUST stay 0 on this engine branch: with sv_lan 1 the Steam
// gameserver never logs on ("Initializing Steam libraries for LAN server")
// and the engine then drops ALL unconnected packets — no A2S query replies,
// no connect challenges, so clients sit at "Connecting to server..." and die
// with "Connection failed after 4 retries". With sv_lan 0 the anonymous
// logon completes ("Connection to Steam servers successful") and local
// connects work. -nomaster still keeps dev shards off the public browser.
sv_lan 0
sv_master_share_game_socket 0

// REQUIRED for local dev, server side: a separate local client connects from
// 127.0.0.1, and by default the engine routes replies to a loopback address
// into its in-process loopback QUEUE instead of a real UDP send — so the client
// never receives the connect challenge / A2S reply and dies with "Connection
// failed after 4 retries" even though the server received the request. Forcing
// real sockets for loopback makes the server actually answer local clients.
// (The client sets the same convar in openvibe_client_default.cfg.)
net_usesocketsforloopback 1
sv_cheats 0
sv_pure 0
developer 1
log on

mp_teamplay 1
mp_timelimit 20
mp_fraglimit 0

