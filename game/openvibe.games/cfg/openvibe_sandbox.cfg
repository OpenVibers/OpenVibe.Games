exec openvibe_common.cfg

hostname "OpenVibe: Source | Sandbox Local"
maxplayers 24

// Sandbox uses the embedded JS "sandbox" gamemode (js/gamemodes/sandbox/).
// Unlike the other dev cfgs, ov_mode is set (not commented) so LoadGamemode
// pulls js/gamemodes/sandbox/server.js instead of defaulting to hub.
ov_mode "sandbox"

// No round timer in sandbox.
mp_timelimit 0
mp_fraglimit 0
ov_js_backend "node"
