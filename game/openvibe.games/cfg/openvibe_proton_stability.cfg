// OpenVibe Proton stability config — executed BEFORE connect so these take
// effect for the first map load. Source SDK 2013's multithreaded render/anim
// paths and joystick/audio init are the common causes of intermittent map-load
// crashes under Proton/DXVK. Disable them for reliable in-game testing.
echo "==== OpenVibe Proton stability cfg loaded ===="

// Single-threaded material system (biggest map-load crash fix under DXVK).
mat_queue_mode 0

// Disable threaded animation / leaf-system paths that crash under Proton.
// (cl_threaded_bone_setup doesn't exist in this engine build — omitted to
// avoid an "Unknown command" console line.)
cl_threaded_client_leaf_system 0
r_threaded_client_shadow_manager 0
r_queued_ropes 0
r_queued_decals 0
r_queued_post_processing 0

// Audio: don't stall/crash when the window loses focus; safer async mix.
snd_mute_losefocus 0

// Reduce first-frame shader/pipeline churn that can trip DXVK during load.
mat_dxlevel 90
r_3dsky 0

// NOTE: never set sv_lan 1 here. Client-side LAN mode skips the Steam auth
// session, and this engine build then silently fails to emit connect packets:
// every join dies with "Connection failed after 4 retries" while the server
// sees nothing. The out-of-date heartbeat spam it used to silence is gone now
// that the dedicated servers run -nomaster.
sv_lan 0

// Auto-open the custom HTML menu so it covers the stock HL2 main menu (which
// freezes) — this is the menu override. The menu only joins a server on an
// explicit user click, so it won't auto-connect on its own.
ov_menu_auto_open 1

// Client-side JS bridge ON: the client no longer embeds QuickJS (that crashed
// under clang-cl); it's now a thin ov_ipc bridge to the client Node runtime
// (ov-runtime.js, port 41998). Crash-proof, and gives the client realm real
// Node + npm. Start the client runtime with: tools/run-js-runtime.sh client.
ov_client_js_enabled 1
