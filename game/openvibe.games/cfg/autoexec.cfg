// OpenVibe: Source client fallback aliases.
//
// The Linux64 SDK build provides real C++ implementations for these commands.
// Proton/Windows clients may still load older DLLs until a Windows GameDLL is
// built, so these aliases prevent noisy "Unknown command" console output.
alias "openvibe_menu" "echo OpenVibe: Source menu is available through GameMenu.res or the launcher."
alias "ov_menu" "openvibe_menu"
alias "ov_join" "echo OpenVibe: authenticated ov_join requires the custom OpenVibe client DLL."
